name: boxy-release

# Publish boxy-hpc to PyPI when a `boxy-v*` tag is pushed. The `boxy-v` prefix
# (not a bare `v*`) keeps boxy's tags from colliding with other artifacts in this
# monorepo. Publishing uses PyPI Trusted Publishing (OIDC) — no API tokens.
# One-time setup and the tag flow are documented in boxy/RELEASING.md.
on:
  push:
    tags: ["boxy-v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify the tag matches boxy.__version__
        run: |
          version=$(python -c 'import sys; sys.path.insert(0, "boxy/src"); import boxy; print(boxy.__version__)')
          echo "package version: $version ; tag: ${GITHUB_REF_NAME}"
          test "boxy-v${version}" = "${GITHUB_REF_NAME}"
      - name: Build sdist + wheel
        run: |
          python -m pip install build twine
          python -m build boxy
      - name: Metadata check
        run: python -m twine check boxy/dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: boxy/dist/

  github-release:
    # A GitHub Release with the wheel + sdist attached — works with zero
    # external setup (unlike PyPI below), so the FIRST release is one tag away.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create the GitHub Release with the dist attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  container:
    # The containerized boxy that ACCOMPANIES the release: the CLI + OpenSSH
    # client in one image, in TWO flavors (hardened = Red Hat hi/python
    # builder; slim = official Debian python) x the last 4 python versions,
    # pushed to ghcr.io/<owner>/boxy. Tag fan-out:
    #   :VERSION, :latest                -> hardened py3.14 (the flagship)
    #   :VERSION-pyX.Y                   -> hardened per python version
    #   :VERSION-slim, :latest-slim      -> slim py3.14
    #   :VERSION-pyX.Y-slim              -> slim per python version
    # GITHUB_TOKEN is enough (packages: write) — no extra secrets.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        pyver: ["3.11", "3.12", "3.13", "3.14"]
        flavor: [hardened, slim]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: boxy/dist/
      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build, smoke, and push this matrix leg
        # the org.opencontainers.image.source label links the GHCR package to
        # THIS repository (Packages sidebar + inherited visibility)
        run: |
          version="${GITHUB_REF_NAME#boxy-v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/boxy"
          if [ "${{ matrix.flavor }}" = "hardened" ]; then
            file=boxy/Containerfile; suffix=""
          else
            file=boxy/Containerfile.slim; suffix="-slim"
          fi
          tags=("$image:$version-py${{ matrix.pyver }}$suffix")
          if [ "${{ matrix.pyver }}" = "3.14" ]; then
            if [ -n "$suffix" ]; then
              tags+=("$image:$version$suffix" "$image:latest$suffix")
            else
              tags+=("$image:$version" "$image:latest")
            fi
          fi
          tag_args=(); for t in "${tags[@]}"; do tag_args+=(-t "$t"); done
          docker build --build-arg PYVER="${{ matrix.pyver }}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.description=boxy — containerized GenAI deployment for HPC (CLI + OpenSSH transport)" \
            --label "org.opencontainers.image.version=$version" \
            "${tag_args[@]}" -f "$file" boxy/
          docker run --rm "${tags[0]}" --version
          docker run --rm --entrypoint sh "${tags[0]}" -c 'command -v ssh'
          for t in "${tags[@]}"; do docker push "$t"; done

  publish:
    # PyPI Trusted Publishing — OPT-IN: set the repository variable
    # PYPI_PUBLISH=true after the one-time PyPI setup (boxy/RELEASING.md).
    # Until then this job is skipped and a release still ships the GitHub
    # Release assets + the GHCR image above.
    if: vars.PYPI_PUBLISH == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # gate publishing; add required reviewers in repo settings
    permissions:
      id-token: write          # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
