name: boxy-release

# Publish boxy-hpc to PyPI when a `boxy-v*` tag is pushed. The `boxy-v` prefix
# (not a bare `v*`) keeps boxy's tags from colliding with other artifacts in this
# monorepo. Publishing uses PyPI Trusted Publishing (OIDC) — no API tokens.
# One-time setup and the tag flow are documented in boxy/RELEASING.md.
on:
  push:
    tags: ["boxy-v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify the tag matches boxy.__version__
        run: |
          version=$(python -c 'import sys; sys.path.insert(0, "boxy/src"); import boxy; print(boxy.__version__)')
          echo "package version: $version ; tag: ${GITHUB_REF_NAME}"
          test "boxy-v${version}" = "${GITHUB_REF_NAME}"
      - name: Build sdist + wheel
        run: |
          python -m pip install build twine
          python -m build boxy
      - name: Metadata check
        run: python -m twine check boxy/dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: boxy/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # gate publishing; add required reviewers in repo settings
    permissions:
      id-token: write          # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
