# chart-headscale — Tier-2 naming authority on OpenShift.
#   helm install headscale ./chart-headscale \
#     --set serverUrl=https://headscale.apps.<cluster> \
#     --set baseDomain=boxy.ts.net
# then mint a pre-auth key:
#   oc exec deploy/headscale -- headscale preauthkeys create --reusable --user boxy
#
# `boxy generate headscale --emit values` prints a ready-to-use copy of this file.

image: docker.io/headscale/headscale:0.23.0

# REQUIRED: public HTTPS URL of the control plane = the OpenShift Route host.
serverUrl: ""
# MagicDNS base domain — models publish as <name>.<baseDomain>.
baseDomain: boxy.ts.net
magicDns: true
# info | debug | trace — debug/trace logs every HTTP request (enrollment, /ts2021).
logLevel: info

# Reusable pre-auth key. Prefer `--set preAuthKey=...` at install time over
# committing it here.
preAuthKey: ""

persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce
  # storageClassName: null  # cluster default

derp:
  udp:
    # false: peers relay over the :443 Route (no UDP ingress, no extra privileges).
    # true:  also expose STUN/3478 via a LoadBalancer for direct paths (needs a
    #        routable UDP ingress; ask your cluster admin).
    enabled: false

route:
  enabled: true
  # host defaults to the serverUrl host when left empty.
  host: ""
  # edge works out of the box: headscale serves plain HTTP on :8080, so the router
  # terminates TLS and forwards HTTP. reencrypt is stronger (encrypted on every hop)
  # but needs headscale serving TLS internally (service-serving cert + tls_* config).
  # The long timeout keeps the persistent Tailscale control connection alive.
  termination: edge
  timeout: 3600s

securityContext:
  runAsNonRoot: true
