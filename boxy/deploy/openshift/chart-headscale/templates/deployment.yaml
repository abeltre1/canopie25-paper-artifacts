apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        {{- include "headscale.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
      containers:
        - name: headscale
          image: {{ .Values.image }}
          args: ["serve"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 3478
              name: stun
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/headscale
            - name: data
              mountPath: /var/lib/headscale
      volumes:
        - name: config
          configMap:
            name: headscale-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: headscale-data
          {{- else }}
          emptyDir: {}
          {{- end }}
