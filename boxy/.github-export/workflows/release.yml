# TEMPLATE for a standalone boxy repository. Move this to
# .github/workflows/release.yml. Standalone repos can use a plain `v*` tag (no
# monorepo collision), and boxy is the repo root (src/, dist/ — no boxy/ prefix).
# Re-point the PyPI pending publisher's repo + workflow names to the new repo.
name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify the tag matches boxy.__version__
        run: |
          version=$(python -c 'import sys; sys.path.insert(0, "src"); import boxy; print(boxy.__version__)')
          test "v${version}" = "${GITHUB_REF_NAME}"
      - run: |
          python -m pip install build twine
          python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/ }

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
