# OSU MPI micro-benchmarks — the standard 2-node interconnect smoke test.
# spack builds (once, --reuse) on the cluster; the binaries live under the
# install prefix's libexec/, so setup resolves that path via `spack location`.
#   boxy app osu-benchmarks --ssh <cluster>
#
# The version is PINNED and the card carries the source URL + sha256 so boxy can
# pre-stage the archive into the job's spack mirror when the cluster's egress
# filter blocks spack's own fetch (field: Zscaler CATEGORY_DENIED) — the plain
# command stays turnkey on filtered sites.
[app]
name = "osu-benchmarks"
summary = "OSU MPI micro-benchmarks: point-to-point bandwidth + latency across 2 nodes"
kind = "spack"
spec = "osu-micro-benchmarks@7.5.2"
sources = [
    "https://mirror.spack.io/_source-cache/archive/61/618de3d0b1122f73a9229177d2da1e5cd62e431190580cb915f2605849cbbbdc.tar.gz",
    "https://mvapich.cse.ohio-state.edu/download/mvapich/osu-micro-benchmarks-7.5.2.tar.gz",
]
sha256 = "618de3d0b1122f73a9229177d2da1e5cd62e431190580cb915f2605849cbbbdc"
nodes = 2
tasks_per_node = 1
time = "30:00"
setup = [
    'OSU="$(spack location -i osu-micro-benchmarks)/libexec/osu-micro-benchmarks/mpi"',
]
run = [
    '"$OSU"/pt2pt/osu_bw',
    '"$OSU"/pt2pt/osu_latency',
]
