# Nemotron-3 Ultra 550B-A55B, BF16 (~1.1TB weights): a MULTI-NODE deployment
# everywhere (the geometry solver spills it into one Ray instance). Flags from
# NVIDIA's Ultra vLLM cookbook (vLLM >= 0.22). No official FP8 Ultra exists;
# for AMD this BF16 checkpoint is the NVIDIA-published option (the community
# RedHatAI FP8-dynamic quant halves the footprint if acceptable).
[model]
match = "nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16*"
engine = "vllm"
gpus = 4
min_vram_gb = 1100
[model.args]
trust_remote_code = true
max_model_len = 262144
max_num_seqs = 16
max_num_batched_tokens = 32768
gpu_memory_utilization = 0.90
kv_cache_dtype = "fp8"
enable_expert_parallel = true
mamba_backend = "triton"
mamba_ssm_cache_dtype = "float32"
reasoning_parser = "nemotron_v3"
tool_call_parser = "qwen3_coder"
enable_auto_tool_choice = true
[model.args.cuda]
enable_flashinfer_autotune = true
[model.env.rocm]
VLLM_ROCM_USE_AITER = "1"
[model.images]
cuda = "docker.io/vllm/vllm-openai:v0.22.0"
rocm = "docker.io/rocm/vllm:latest"
