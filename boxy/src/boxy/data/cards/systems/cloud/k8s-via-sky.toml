# Kubernetes via SkyPilot (sky supports a k8s backend). Same box+card ->
# sky task; sky schedules the pod. boxy generate sky --location <this>.
[location]
name = "cloud-k8s"
scheduler = "none"
accelerator = "cuda"
[location.resources]
gpus_per_node = 1
gpu_vram_gb = 80    # A100/H100-class parts; the model-card geometry solver sizes against this
accelerator_type = "A100"
