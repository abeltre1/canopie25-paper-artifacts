# Cloud GPU on AWS via SkyPilot. Use with: boxy generate sky --location <this>
# --serve. SkyPilot picks the instance for the accelerator_type across 20+ clouds.
[location]
name = "cloud-aws-gpu"
scheduler = "none"
accelerator = "cuda"
[location.resources]
gpus_per_node = 1
gpu_vram_gb = 80    # A100/H100-class parts; the model-card geometry solver sizes against this
accelerator_type = "A100"
