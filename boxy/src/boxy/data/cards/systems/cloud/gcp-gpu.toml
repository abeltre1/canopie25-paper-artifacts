# Cloud GPU on GCP via SkyPilot (H100). boxy generate sky --location <this>.
[location]
name = "cloud-gcp-gpu"
scheduler = "none"
accelerator = "cuda"
[location.resources]
gpus_per_node = 1
gpu_vram_gb = 80    # A100/H100-class parts; the model-card geometry solver sizes against this
accelerator_type = "H100"
