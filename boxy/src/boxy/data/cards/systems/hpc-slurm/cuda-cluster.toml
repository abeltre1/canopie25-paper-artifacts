# Slurm + CUDA GPU cluster (clustera-like). Podman on the node; RamaLama-informed
# vLLM/llama.cpp images chosen per accelerator.
[location]
name = "slurm-cuda"
scheduler = "slurm"
accelerator = "cuda"
runtime = "podman"
offline = true
[location.resources]
gpus_per_node = 4
gpu_vram_gb = 80    # A100/H100-class parts; the model-card geometry solver sizes against this
