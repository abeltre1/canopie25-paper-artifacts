# Slurm cluster where Docker is the sanctioned runtime (less common).
[location]
name = "slurm-docker-cuda"
scheduler = "slurm"
accelerator = "cuda"
runtime = "docker"
offline = true
[location.resources]
nodes = 1
gpus_per_node = 4
gpu_vram_gb = 80    # A100/H100-class parts; the model-card geometry solver sizes against this
[location.staging]
models_dir = "./models"
