# Slurm/CUDA example cluster (paper): NVIDIA H100 nodes, Slurm, Podman.
[location]
name = "slurm-podman-cuda"
scheduler = "slurm"
accelerator = "cuda"
runtime = "podman"
offline = true

[location.resources]
nodes = 2
gpus_per_node = 4
gpu_vram_gb = 80    # A100/H100-class parts; the model-card geometry solver sizes against this

[location.staging]
models_dir = "./models"
