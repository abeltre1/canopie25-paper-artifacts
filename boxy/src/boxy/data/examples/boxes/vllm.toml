# Generic vLLM serving box — runtime- and accelerator-agnostic.
# Pair it with a location: boxy serve --box vllm.toml --location flux-apptainer-rocm.toml
[box]
name = "vllm"
image = "vllm/vllm-openai:v0.24.0"  # latest (registry-verified); the paper used v0.9.1
entrypoint = "vllm"
# Relative path => resolved against workdir (the mounted ${MODELS_DIR});
# also accepts hf://org/name to pull via RamaLama transports.
model = "Llama-4-Scout-17B-16E-Instruct"
workdir = "/vllm-workspace/models"
ports = [8000]

[box.env]
# Offline + determinism env comes from the location; box.env always wins.

[[box.volumes]]
source = "${MODELS_DIR}"
target = "/vllm-workspace/models"

[box.args]
# Appended last; never overrides args you pass on the CLI.
tensor_parallel_size = 4
seed = 12345
