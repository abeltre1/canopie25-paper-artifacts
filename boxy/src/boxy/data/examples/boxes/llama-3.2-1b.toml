# Smallest Llama in the family (Llama 3.2, 1B) as a Q4 GGUF -> llama.cpp.
# PORTABLE: the same file runs on a CPU laptop AND on GPU nodes. Pair it with ANY
# location (local, slurm, flux, cloud) — the model never names the platform.
#   boxy serve --box llama-3.2-1b.toml                                   # local desktop
#   boxy serve --box llama-3.2-1b.toml --scheduler slurm --gpus 1        # Slurm
#   boxy serve --box llama-3.2-1b.toml --scheduler flux  --gpus 1        # Flux
#   boxy serve --box llama-3.2-1b.toml --location ../locations/mysite.toml   # any site
# Model-first shorthand (no box file needed):
#   boxy serve hf://hugging-quants/Llama-3.2-1B-Instruct-Q4_K_M-GGUF/llama-3.2-1b-instruct-q4_k_m.gguf
# (Ungated community requant. For the official gated weights on vLLM instead:
#  boxy serve hf://meta-llama/Llama-3.2-1B-Instruct --scheduler slurm --gpus 1  [needs an HF token])
[box]
name = "llama-3.2-1b"
engine = "llama.cpp"
model = "hf://hugging-quants/Llama-3.2-1B-Instruct-Q4_K_M-GGUF/llama-3.2-1b-instruct-q4_k_m.gguf"
ports = [8090]
