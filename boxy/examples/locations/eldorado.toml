# Eldorado cluster (paper): AMD MI300a nodes, Flux, Apptainer.
[location]
name = "eldorado"
scheduler = "flux"
accelerator = "rocm"
runtime = "apptainer"
offline = true

[location.resources]
nodes = 2
gpus_per_node = 4

[location.modules]
load = ["rocm/6.4.0"]

[location.staging]
models_dir = "./models"

[location.tuning]
# MI300a HBM is shared with the host CPU: leave memory for the OS
# (paper finding; default 0.9 OOMs the node).
gpu_memory_utilization = 0.7
